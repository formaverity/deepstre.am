<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- MURMUR — point cloud glyph. Reads as a LiDAR grove cross-section:
       dense canopy top, thinning understory, sparse ground return. -->
  <g fill="#B9A0E0">
    <!-- Canopy cluster -->
    <circle cx="50" cy="14" r="5.5"/>
    <circle cx="38" cy="22" r="4.5"/>
    <circle cx="62" cy="20" r="5.0"/>
    <circle cx="28" cy="33" r="3.5"/>
    <circle cx="50" cy="28" r="4.0"/>
    <circle cx="70" cy="30" r="4.0"/>

    <!-- Understory — sparser, smaller -->
    <circle cx="20" cy="48" r="3.0"/>
    <circle cx="40" cy="46" r="2.5"/>
    <circle cx="58" cy="44" r="2.8"/>
    <circle cx="76" cy="46" r="2.8"/>
    <circle cx="33" cy="58" r="2.2"/>
    <circle cx="52" cy="56" r="2.0"/>
    <circle cx="68" cy="57" r="2.2"/>

    <!-- Ground return — very sparse -->
    <circle cx="22" cy="70" r="1.8"/>
    <circle cx="40" cy="72" r="1.5"/>
    <circle cx="56" cy="70" r="1.8"/>
    <circle cx="72" cy="68" r="1.5"/>
    <circle cx="83" cy="72" r="1.5"/>
    <circle cx="32" cy="80" r="1.2"/>
    <circle cx="50" cy="82" r="1.2"/>
    <circle cx="65" cy="80" r="1.0"/>
    <circle cx="78" cy="82" r="1.0"/>
  </g>
</svg>
